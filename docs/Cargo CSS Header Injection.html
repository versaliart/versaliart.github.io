    return !!document.querySelector(
      'link[rel="preload"][as="style"][href="' + href + '"]' +
      ',link[rel="stylesheet"][href="' + href + '"]'
    );
  }

  urls.forEach(function (href) {

    var link = document.createElement('link');

    link.crossOrigin = '';
    link.onload = function () {

      this.rel = 'stylesheet';
    };

    head.appendChild(link);
  });
})();
